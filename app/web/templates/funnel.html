<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Funnel — {{ project.label }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { padding: 1.5rem; } code { white-space: pre-wrap; } </style>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Funnel for {{ project.label }}</h1>
        <a href="/logout" class="btn btn-outline-secondary btn-sm">Log out</a>
    </div>

    {# Filter form: GETs the fragment endpoint and swaps it in. #}
    <form id="filter-form" class="card card-body mb-4">
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">First event</label>
                <input class="form-control" name="first_event" value="{{ filters.first_event }}"></div>
            <div class="col-md-2"><label class="form-label">Date from</label>
                <input class="form-control" type="date" name="date_from" value="{{ filters.date_from }}"></div>
            <div class="col-md-2"><label class="form-label">Date to</label>
                <input class="form-control" type="date" name="date_to" value="{{ filters.date_to }}"></div>
            <div class="col-md-2"><label class="form-label">Platform</label>
                <input class="form-control" name="platform" value="{{ filters.platform or '' }}"></div>
            <div class="col-md-3"><label class="form-label">Country codes</label>
                <input class="form-control" name="country_code" placeholder="PL,GB,DE"></div>
            <div class="col-md-3"><label class="form-label">Breakdown param key</label>
                <input class="form-control" name="breakdown_param_key" value="{{ filters.breakdown_param_key or '' }}"></div>
            <div class="col-md-6"><label class="form-label">Metric events</label>
                <input class="form-control" name="metric_events" value="{{ filters.metric_events }}"></div>
            <div class="col-md-3"><label class="form-label">&nbsp;</label>
                <button type="submit" class="btn btn-primary w-100">Search</button></div>
        </div>
    </form>

    <div id="funnel-table" class="card card-body">
        {% include "funnel_part.html" %}
    </div>

    <script>
    const form = document.getElementById('filter-form');
    const target = document.getElementById('funnel-table');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        target.innerHTML = '<div class="text-muted">Loading…</div>';
        const params = new URLSearchParams(new FormData(form)).toString();
        const res = await fetch('./funnel/fragment?' + params);
        target.innerHTML = await res.text();
    });
    </script>
</body>
</html>
