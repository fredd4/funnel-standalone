<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Funnel — sign in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { padding: 1.5rem; } </style>
</head>
<body>
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card card-body mt-5">
                <h1 class="h4 mb-3">Sign in</h1>
                {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}
                <form method="post" action="/login">
                    <input type="hidden" name="next" value="{{ next }}">
                    <label class="form-label">Access token</label>
                    <input class="form-control mb-3" type="password" name="token"
                           autocomplete="off" autofocus placeholder="Paste your token">
                    <button type="submit" class="btn btn-primary w-100">Sign in</button>
                </form>
                <p class="text-muted small mt-3 mb-0">
                    The token is stored in a secure cookie on this device.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
